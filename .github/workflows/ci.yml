name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm
      - name: Install
        run: npm ci
      - name: Tests (unitaires)
        run: npm test
      - name: Lint / typecheck
        run: npm run lint
      - name: Build (api + web)
        run: npm run build
