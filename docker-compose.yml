services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mtw
      POSTGRES_PASSWORD: mtw
      POSTGRES_DB: mtw
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtw"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      PORT: 3001
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://mtw:mtw@db:5432/mtw
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

  mobile:
    build:
      context: .
      dockerfile: mobile/Dockerfile
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_NO_TELEMETRY: 1
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-localhost}
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - api
    stdin_open: true
    tty: true

volumes:
  db_data:
